<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SORT VISUALIZER</h1>
            <p class="subtitle">Algorithm Animation Engine</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <div class="control-item">
                    <label for="algorithm">Algorithm</label>
                    <select id="algorithm">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                        <option value="heap">Heap Sort</option>
                    </select>
                </div>

                <div class="control-item">
                    <label for="arraySize">Array Size: <span id="arraySizeValue" class="value-display">50</span></label>
                    <input type="range" id="arraySize" min="10" max="100" value="50">
                </div>

                <div class="control-item">
                    <label for="speed">Speed: <span id="speedValue" class="value-display">50ms</span></label>
                    <input type="range" id="speed" min="1" max="100" value="50">
                </div>
            </div>

            <div class="button-group">
                <button id="sortBtn" class="btn-primary">Sort</button>
                <button id="pauseBtn" class="btn-secondary" disabled>Pause</button>
                <button id="resetBtn" class="btn-secondary">Reset</button>
                <button id="newArrayBtn" class="btn-danger">New Array</button>
            </div>
        </div>

        <div class="visualizer-container" id="visualizer">
            <!-- Bars are generated by script.js -->
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Comparisons</div>
                <div class="stat-value" id="comparisons">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Array Accesses</div>
                <div class="stat-value" id="arrayAccesses">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Time Elapsed</div>
                <div class="stat-value" id="timeElapsed">0.0s</div>
            </div>
        </div>

        <div class="info-panel" id="infoPanel">
            <h2>About Bubble Sort</h2>
            <p><span class="complexity">Time: O(n²)</span><span class="complexity">Space: O(1)</span></p>
            <p>Bubble Sort repeatedly steps through the list, compares adjacent elements and swaps them if they are in the wrong order.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
